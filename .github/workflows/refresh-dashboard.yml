name: Refresh dashboard

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        run: python3 scripts/score_grants.py
        env:
          SOURCE_URL: ${{ secrets.SOURCE_URL }}

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force dashboards/grants_dashboard.md data/scored_grants.csv docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Refresh dashboard"
          git pull --rebase
          git push

      - name: Deploy to Netlify
        run: |
          npm install -g netlify-cli --silent
          echo "--- Netlify auth status ---"
          netlify status || true
          echo "--- Deploying ---"
          netlify deploy --prod --dir docs --message "Refresh dashboard" --debug
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
